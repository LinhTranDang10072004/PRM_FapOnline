services:
  backend:
    build: .
    container_name: fap-online-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:sqlserver://host.docker.internal:1433;databaseName=PRM_EducationManagement;encrypt=true;trustServerCertificate=true
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: "123"
      JWT_SECRET: prm-education-management-secret-key-2026-very-long
      JWT_EXPIRATION: "86400000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
